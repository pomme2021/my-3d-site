<!DOCTYPE html>
<html>
<head>
    <title>3D Model Viewer</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
        #status { position: fixed; top: 10px; left: 10px; color: white; z-index: 10; }
    </style>
    <!-- Stable Engine Links -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <div id="status">Loading 3D Model...</div>

    <script>
        window.onload = function() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(1, 1, 1);
            scene.add(light1);
            scene.add(new THREE.AmbientLight(0x404040));

            // Controls (Mouse Rotation/Zoom)
            const controls = new THREE.OrbitControls(camera, renderer.domElement);

            const loader = new THREE.STLLoader();
            
            // *** CHANGE 'riverbend_sky.stl' TO YOUR FILENAME ***
            loader.load('riverbend_sky.stl', function (geometry) {
                const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const mesh = new THREE.Mesh(geometry, material);
                
                geometry.center();
                geometry.computeBoundingSphere();
                
                // AUTO-ZOOM: Moves camera perfectly based on model size
                const radius = geometry.boundingSphere.radius;
                camera.position.z = radius * 2.5; 

                scene.add(mesh);
                document.getElementById('status').style.display = 'none';

                function animate() {
                    requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();
            }, undefined, function(err) {
                document.getElementById('status').innerText = "Error: File 'model.stl' not found.";
                document.getElementById('status').style.color = "red";
            });
        };
    </script>
</body>
</html>
